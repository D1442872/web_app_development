{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0 fw-bold">✨ 建立新活動</h5>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('admin.create_event') }}" method="POST">
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="title" class="form-label fw-bold">活動名稱 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="event_date" class="form-label fw-bold">活動時間 <span class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" id="event_date" name="event_date" required>
                        </div>
                        <div class="col-md-6">
                            <label for="capacity" class="form-label fw-bold">名額上限 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="capacity" name="capacity" min="1" placeholder="例如：50" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="location" class="form-label fw-bold">活動地點 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="location" name="location" placeholder="例如：圖書館 B1 會議室" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="description" class="form-label fw-bold">活動描述</label>
                        <textarea class="form-control" id="description" name="description" rows="5" placeholder="輸入活動詳細內容..."></textarea>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-end mt-4">
                        <a href="{{ url_for('events.index') }}" class="btn btn-outline-secondary me-2 px-4">取消</a>
                        <button type="submit" class="btn btn-primary px-4 fw-bold">送出並建立</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
